 <!-- Portfolio Modals -->
 {% for post in site.posts %}
    <div class="portfolio-modal modal fade" id="portfolioModal{{ post.modal-id }}" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-content">
            <div class="close-modal" data-dismiss="modal">
                <div class="lr">
                    <div class="rl">
                    </div>
                </div>
            </div>
            <div class="container">
                <div class="row">
                    <div class="col-lg-8 col-lg-offset-2">
                        <div class="modal-body">
                            <h2>{{ post.title }}</h2>
                            <hr class="star-primary">
                            <img src="img/portfolio/{{ post.img }}" class="img-responsive img-centered height-500" alt="{{ post.alt }}">
                            <p>{{ post.description }}</p>
                         <blockquote 
  class="instagram-media" 
  data-instgrm-captioned data-instgrm-permalink="https://www.instagram.com/reel/{{ post.reel }}/" 
  style="max-width:540px; min-width:326px; width:-webkit-calc(100% - 2px); width:calc(100% - 2px);">
</blockquote> 


                            <div>{{ post.breakdown }}</div>
                            <ul class="list-inline item-details">
                                <li>More:
                                    <strong><a href="{{ post.link }}">{{ post.more }}</a>
                                    </strong>
                                </li>
                                <li>Date:
                                    <strong>{{ post.project-date }}
                                    </strong>
                                </li>
                                <li>Turn around:
                                    <strong>{{ post.project-time }}
                                    </strong>
                                </li>
                            </ul>
                            <button type="button" class="btn btn-default" data-dismiss="modal"><i class="fa fa-times"></i> Close</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script async src="//www.instagram.com/embed.js"></script>
{% endfor %}
